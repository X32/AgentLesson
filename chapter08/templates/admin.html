<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>蜗牛智能客服</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>

    <script>
        // 每次加载页面时，都向服务器请求确认Token是否有效，如果无效或过期则显示未登录状态
        document.addEventListener("DOMContentLoaded", function () {
            // 先判断localStorage中存在Token，再发送请求给后端确认Token可用
            if (localStorage.getItem("token") != null) {
                fetch("/checklogin", {
                    method: 'POST',
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({"token": localStorage.getItem("token")})
                })
                .then(response => response.json())
                .then(data => {
                    if (data["message"] === "Token-OK") {
                        welcome = document.getElementById("welcome");
                        welcome.innerHTML = "你好，" + data["username"];
                        welcome.innerHTML += "&nbsp;&nbsp;" +
                            "<a href='#' onclick='doLogout()'>退出</a>";
                    }
                });
            }
        });
    </script>
</head>
<body>
  <div class="menu">
      <div class="logo">蜗牛智能客服</div>
      <!-- 用户登录框默认不显示，点击登录时才显示 -->
      <div class="login">
          用户名：<input type="text" id="username">
          密码：<input type="password" id="password">
          &nbsp;&nbsp;<button onclick="doLogin()">登录</button>
      </div>
      <div id="welcome">
          <a href="#" onclick="clickLogin()">点击登录</a>
      </div>
  </div>

  <div class="upload">
      <div>
          选择文档：<input type="file" id="file" onchange="fillTitle()"/>
      </div>
      <div>
          文档标题：<input type="title" id="title"/>
      </div>
      <div>
          所属集合：<select id="collection" style="width: 100px">
          <option value="Woniu-Collection">蜗牛学苑</option>
          <option value="Huawei-Collection">华为公司</option>
          <option value="AI-Collection">人工智能</option>
        </select>
      </div>
      <div>
          <button onclick="doUpload(this)">上传文档</button>
      </div>
  </div>

  <table>
      <thead>
      <tr>
          <td>文档编号</td>
          <td>文档标题</td>
          <td>文档大小</td>
          <td>所属集合</td>
          <td>上传时间</td>
          <td>相关操作</td>
      </tr>
      </thead>
      <tbody>
      {% for info in docinfos %}
      <tr>
        <td>{{info.docname}}</td>
        <td>{{info.doctitle}}</td>
        <td>{{info.filesize/1000|int}} KB</td>
        <td>{{info.collection}}</td>
        <td>{{info.createtime}}</td>
          <td>
              <a href="/static/docs/{{info.docname}}">打开文档</a>
              <a href="/section/{{info.docname}}">分段查看</a>
          </td>
      </tr>
      {% endfor %}
      </tbody>
  </table>
</body>
</html>
