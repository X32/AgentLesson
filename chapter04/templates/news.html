<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>每日新闻摘要</title>
    <style>
        #menu {
            width: 960px;
            min-height: 80px;
            border-bottom: solid 1px lightskyblue;
            margin: 10px auto 30px auto;
            text-align: center;
            line-height: 40px;
            padding: 0 20px;
            overflow: hidden;
        }
        #menu #logo {
            width: 200px;
            line-height: 80px;
            float: left;
            text-align: left;
            font-size: 26px;
        }
        #menu #category {
            width: auto;
            float: right;
            text-align: right;
            line-height: 40px;
            padding: 10px 0;
        }
        .news {
            width: 960px;
            min-height: 150px;
            border: solid 1px lightgrey;
            margin: 30px auto;
            border-radius: 10px;
        }
        .headline {
            width: 95%;
            height: 30px;
            border-bottom: solid 1px lightgrey;
            padding: 15px;
            margin: auto;
        }
        .title {
            width: 70%;
            height: 30px;
            text-align: left;
            float: left;
            color: mediumslateblue;
        }
        .view {
            width: 28%;
            height: 30px;
            text-align: right;
            float: right;
        }
        .content {
            width: 95%;
            min-height: 30px;
            text-align: left;
            border: solid 0px lightgrey;
            padding: 12px;
            margin: auto;
            margin-top: 10px;
            font-size: 15px;
        }
        #history {
            width: 940px;
            min-height: 30px;
            border: solid 1px lightgrey;
            margin: 30px auto;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        #history .date {
            margin: 0px 10px;
        }
        a:link, a:visited {
            text-decoration: none;
            color: #337ab7;
        }
        a:hover, a:active {
            text-decoration: none;
            color: #e56244;
        }
    </style>
</head>
<body>
    <div id="menu">
        <div id="logo">每日新闻摘要</div>
        <div id="category">
            <span style="margin-right: 50px">{{today}}</span>
            <a href="/{{today}}/hot">今日要闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/china">国内新闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/world">国际新闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/mil">军事新闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/finance">财经新闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/tech">科技新闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/ent">娱乐新闻</a>&nbsp;&nbsp;&nbsp;
            <a href="/{{today}}/society">社会新闻</a>
        </div>
    </div>

    <!-- 此处循环填充新闻摘要 -->
    {% for result in news_list %}
    <div class="news">
        <div class="headline">
            <div class="title">{{result.News.headline}}</div>
            <div class="view"><a href="{{result.News.hyperlink}}" target="_blank">查看原文</a></div>
        </div>
        <div class="content">{{result.News.summary}}</div>
    </div>
    {% endfor %}


    <!-- 底部按照日期进行分组查询，获取某一天的新闻，后续由Jinja2进行动态填充-->
    <div id="history">
        {% for date in date_list %}
        <span class="date"><a href="/{{date.mydate}}/hot">{{date.mydate}}</a></span>
        {% endfor %}
    </div>
</body>
</html>
