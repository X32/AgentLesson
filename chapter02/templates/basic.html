<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>模板变量调用</title>
</head>
<body>
<div style="width: 300px; height: 150px; border: solid 2px red;
    text-align: center; padding: 20px; line-height: 40px">
    <!-- 使用双花括号来引用模板变量 -->
    <span>文章作者为：{{author}}</span><br/>
    <span>文章标题是：{{title}}</span><br/>
    <span>阅读次数为：{{count + 1}}</span>
</div>
</body>
</html>
